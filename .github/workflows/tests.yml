name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2.4.1
        with:
          version: 4.7.0
          use-dotnet: false

      - name: Import Godot Project
        run: godot --headless --import

      - name: Run GUT Tests
        run: |
          set +e
          godot --headless -s addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit > gut_output.log 2>&1
          GUT_RC=$?
          set -e
          cat gut_output.log

          # Fail on any test failures or engine errors
          if grep -qiE "Failing Tests|SCRIPT ERROR" gut_output.log; then
            echo "ERROR: GUT reported test failures or script errors."
            exit 1
          fi

          # Fail if GUT silently skipped a file due to a parse error or bad base class.
          # GUT loads each file and emits these strings when a script cannot be used.
          if grep -vi "Ignoring Inner Class" gut_output.log | grep -qiE "Parse error|does not extend GutTest|does not extend gut_test"; then
            echo "ERROR: One or more test scripts failed to load (parse error or wrong base class)."
            echo "       GUT silently skips unparseable files - this step ensures they fail loudly."
            exit 1
          fi

          # Fail if zero tests were collected (catches empty runner or wrong path).
          if ! grep -qE "Tests[[:space:]]+[1-9]" gut_output.log; then
            echo "ERROR: Zero tests were collected or run. Check -gdir path and GUT version."
            exit 1
          fi

          # Assert expected script count so a silently skipped file fails the build.
          # Update this number whenever a test script is added or removed.
          EXPECTED_SCRIPTS=32
          ACTUAL_SCRIPTS=$(grep -oE "Script[s]?:?[[:space:]]+[0-9]+" gut_output.log | grep -oE "[0-9]+$" | head -1)
          if [ -z "$ACTUAL_SCRIPTS" ]; then
            echo "WARNING: Could not parse script count from GUT output - skipping count assertion."
          elif [ "$ACTUAL_SCRIPTS" -ne "$EXPECTED_SCRIPTS" ]; then
            echo "ERROR: Expected $EXPECTED_SCRIPTS test scripts but GUT loaded $ACTUAL_SCRIPTS."
            echo "       Add/remove scripts from the expected count when the test suite changes."
            exit 1
          fi

      - name: Enforce G3 (No Node inheritance in domain)
        run: |
          if [ -d "scripts/simulation" ]; then
            if grep -r -E "extends[[:space:]]+(Node|Node2D|Node3D|Control|CanvasItem|Window)" scripts/simulation/; then
              echo "Error: Godot Node inheritance is forbidden under scripts/simulation/. Domain classes must extend RefCounted or be plain."
              exit 1
            fi
          fi

  config-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Validate plant configs against schemas
        run: bash tools/ci/validate_configs.sh
